services:
  mcpui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-bedrock-ui
    restart: unless-stopped
    # 使用host网络模式，直接共享宿主机网络，可以直接访问localhost
    network_mode: "host"
    env_file:
      - .env.local
    volumes:
      - ./.env.local:/app/.env.local
      # Mount certificates directory for HTTPS
      - ./certificates:/app/certificates
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--http-parser=legacy --max-http-header-size=16384
      # Control whether to use HTTPS (true) or HTTP (false)
      - USE_HTTPS=${USE_HTTPS:-false}
    healthcheck:
      # Use a conditional health check based on USE_HTTPS
      test: |
        /bin/sh -c '
        if [ "$$USE_HTTPS" = "true" ]; then
          wget --no-check-certificate -qO- https://localhost:3000/api/health;
        else
          wget -qO- http://localhost:3000/api/health;
        fi'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
